<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="330" viewBox="0 0 1320 330" role="img" aria-label="模型输出与前端渲染之间的安全边界">
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#263238"/></marker><style>.bg{fill:#fff}.box{fill:#eef5ff;stroke:#2b66ff;stroke-width:1.5}.side{fill:#f8fafc;stroke:#7d8b99;stroke-width:1.3}.risk{fill:#fff3f3;stroke:#d33;stroke-width:1.4}.txt{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:16px;fill:#111827}.flow{stroke:#263238;stroke-width:1.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#7d8b99;stroke-width:1.4;fill:none;stroke-dasharray:4 4;marker-end:url(#arrow)}.warn{font-size:14px;font-weight:700;fill:#b33939}</style></defs>
  <rect class="bg" width="1320" height="330"/>
  <rect class="side" x="30" y="148" width="130" height="54"/><text class="txt" x="95" y="181" text-anchor="middle">LLM 输出</text>
  <rect class="box" x="210" y="148" width="180" height="54"/><text class="txt" x="300" y="171" text-anchor="middle">结构化渲染</text><text class="txt" x="300" y="191" text-anchor="middle">意图</text>
  <rect class="box" x="475" y="105" width="180" height="54"/><text class="txt" x="565" y="128" text-anchor="middle">服务端策略</text><text class="txt" x="565" y="148" text-anchor="middle">校验</text>
  <rect class="box" x="720" y="60" width="170" height="54"/><text class="txt" x="805" y="93" text-anchor="middle">安全渲染契约</text>
  <rect class="box" x="930" y="60" width="170" height="54"/><text class="txt" x="1015" y="83" text-anchor="middle">前端受控</text><text class="txt" x="1015" y="103" text-anchor="middle">组件渲染</text>
  <rect class="box" x="720" y="150" width="150" height="54"/><text class="txt" x="795" y="183" text-anchor="middle">审计记录</text>
  <rect class="risk" x="475" y="215" width="170" height="54"/><text class="txt" x="560" y="248" text-anchor="middle">原始 HTML/JS</text>
  <rect class="risk" x="1150" y="105" width="130" height="54"/><text class="txt" x="1215" y="138" text-anchor="middle">用户动作</text>
  <path class="flow" d="M160 175 H210"/><path class="flow" d="M390 148 C420 118 440 132 475 132"/><path class="flow" d="M655 132 C675 88 695 87 720 87"/><path class="flow" d="M890 87 H930"/><path class="flow" d="M1100 87 C1125 90 1135 112 1150 132"/><path class="flow" d="M655 132 C680 175 690 177 720 177"/>
  <path class="dash" d="M390 175 C420 190 440 232 475 242"/><text class="warn" x="410" y="222">阻断</text>
  <path class="flow" d="M1215 159 C1140 285 670 265 565 159"/>
</svg>
