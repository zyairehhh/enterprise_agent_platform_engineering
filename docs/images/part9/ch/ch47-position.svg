    <style>
      .bg{fill:#fff}.box{fill:#eef5ff;stroke:#2b66ff;stroke-width:1.5}.side{fill:#f8fafc;stroke:#7d8b99;stroke-width:1.3}.store{fill:#f8fafc;stroke:#7d8b99;stroke-width:1.3}.txt{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:16px;fill:#111827}.flow{stroke:#263238;stroke-width:1.5;fill:none;marker-end:url(#arrow)}.flow-blue{stroke:#1f5f8b;stroke-width:1.8;fill:none;marker-end:url(#arrow-blue)}.flow-red{stroke:#b33939;stroke-width:1.8;fill:none;marker-end:url(#arrow-red)}.label{font-size:14px;font-weight:700;fill:#b33939}
    </style>
