<svg xmlns="http://www.w3.org/2000/svg" width="980" height="350" viewBox="0 0 980 350" role="img" aria-label="Generated content provenance pipeline">
  <defs><marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#d14b4b"/></marker><style>.bg{fill:#fff}.comp{fill:#eef5ff;stroke:#2563eb;stroke-width:1.5}.ext{fill:#f4f4f5;stroke:#9ca3af;stroke-width:1.3}.ctrl{fill:#fff1f2;stroke:#d14b4b;stroke-width:1.4}.flow{fill:none;stroke:#d14b4b;stroke-width:2;marker-end:url(#r)}.txt{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}</style></defs>
  <rect class="bg" width="980" height="350"/>
  <rect class="ext" x="42" y="100" width="140" height="62" rx="6"/><text class="txt" x="112" y="127" text-anchor="middle">输入证据</text><text class="sub" x="112" y="149" text-anchor="middle">数据 / prompt / 工具</text>
  <rect class="comp" x="242" y="100" width="140" height="62" rx="6"/><text class="txt" x="312" y="127" text-anchor="middle">Agent 生成</text><text class="sub" x="312" y="149" text-anchor="middle">文本 / 图像 / 报告</text>
  <rect class="ctrl" x="442" y="100" width="140" height="62" rx="6"/><text class="txt" x="512" y="127" text-anchor="middle">策略与标识</text><text class="sub" x="512" y="149" text-anchor="middle">label / metadata</text>
  <rect class="comp" x="642" y="100" width="140" height="62" rx="6"/><text class="txt" x="712" y="127" text-anchor="middle">内容凭据</text><text class="sub" x="712" y="149" text-anchor="middle">C2PA / signature</text>
  <rect class="ext" x="842" y="100" width="100" height="62" rx="6"/><text class="txt" x="892" y="127" text-anchor="middle">导出</text><text class="sub" x="892" y="149" text-anchor="middle">发布 / 分享</text>
  <rect class="ext" x="442" y="232" width="140" height="56" rx="6"/><text class="txt" x="512" y="255" text-anchor="middle">审计记录</text><text class="sub" x="512" y="276" text-anchor="middle">trace / approval</text>
  <path class="flow" d="M182 131H242"/><path class="flow" d="M382 131H442"/><path class="flow" d="M582 131H642"/><path class="flow" d="M782 131H842"/><path class="flow" d="M512 162V232"/><text class="sub" x="492" y="52" text-anchor="middle">生成内容必须能回到创建工具、输入证据和责任人</text>
</svg>
