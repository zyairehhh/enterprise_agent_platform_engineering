<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380" role="img" aria-label="Three-year Agent platform roadmap">
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#d14b4b"/></marker><style>.bg{fill:#fff}.comp{fill:#eef5ff;stroke:#2563eb;stroke-width:1.5}.ext{fill:#f4f4f5;stroke:#9ca3af;stroke-width:1.3}.ctrl{fill:#fff1f2;stroke:#d14b4b;stroke-width:1.4}.line{fill:none;stroke:#d14b4b;stroke-width:2;marker-end:url(#a)}.txt{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}</style></defs>
  <rect class="bg" width="980" height="380"/>
  <line x1="90" y1="190" x2="890" y2="190" stroke="#d1d5db" stroke-width="2"/>
  <rect class="ext" x="70" y="92" width="170" height="88" rx="6"/><text class="txt" x="155" y="122" text-anchor="middle">0-6 months</text><text class="sub" x="155" y="147" text-anchor="middle">High-value scenarios</text><text class="sub" x="155" y="166" text-anchor="middle">Model gateway / trace</text>
  <rect class="comp" x="292" y="202" width="170" height="96" rx="6"/><text class="txt" x="377" y="232" text-anchor="middle">6-12 months</text><text class="sub" x="377" y="257" text-anchor="middle">Runtime / Guardrails</text><text class="sub" x="377" y="276" text-anchor="middle">Standard onboarding</text>
  <rect class="comp" x="514" y="92" width="190" height="96" rx="6"/><text class="txt" x="609" y="122" text-anchor="middle">Year 2</text><text class="sub" x="609" y="147" text-anchor="middle">Multi-tenant / SLO</text><text class="sub" x="609" y="166" text-anchor="middle">Eval and compliance</text>
  <rect class="ctrl" x="746" y="202" width="190" height="96" rx="6"/><text class="txt" x="841" y="232" text-anchor="middle">Year 3</text><text class="sub" x="841" y="257" text-anchor="middle">AI-native systems</text><text class="sub" x="841" y="276" text-anchor="middle">Tool marketplace</text>
  <path class="line" d="M240 136 C270 150 272 232 292 244"/><path class="line" d="M462 250 C492 238 492 150 514 140"/><path class="line" d="M704 140 C734 154 724 238 746 250"/>
  <text class="sub" x="488" y="336" text-anchor="middle">Roadmap follows maturity: scenario value, capability reuse,</text>
  <text class="sub" x="488" y="356" text-anchor="middle">operations governance, and security compliance grow together.</text>
</svg>
