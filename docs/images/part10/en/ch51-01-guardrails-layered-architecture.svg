<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-label="Layered guardrails architecture">
  <defs><marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#d14b4b"/></marker><marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#2563eb"/></marker><style>.bg{fill:#fff}.comp{fill:#eef5ff;stroke:#2563eb;stroke-width:1.5}.ext{fill:#f4f4f5;stroke:#9ca3af;stroke-width:1.3}.guard{fill:#fff1f2;stroke:#d14b4b;stroke-width:1.4}.red{fill:none;stroke:#d14b4b;stroke-width:2;marker-end:url(#r)}.blue{fill:none;stroke:#2563eb;stroke-width:2;marker-end:url(#b)}.txt{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}</style></defs>
  <rect class="bg" width="980" height="390"/>
  <rect class="ext" x="42" y="70" width="142" height="56" rx="6"/><text class="txt" x="113" y="104" text-anchor="middle">Users and files</text>
  <rect class="guard" x="236" y="70" width="142" height="56" rx="6"/><text class="txt" x="307" y="94" text-anchor="middle">Input Guard</text><text class="sub" x="307" y="115" text-anchor="middle">Content / intent</text>
  <rect class="guard" x="236" y="156" width="142" height="56" rx="6"/><text class="txt" x="307" y="180" text-anchor="middle">Context Guard</text><text class="sub" x="307" y="201" text-anchor="middle">Source / injection</text>
  <rect class="comp" x="450" y="112" width="142" height="72" rx="6"/><text class="txt" x="521" y="143" text-anchor="middle">Agent Runtime</text><text class="sub" x="521" y="165" text-anchor="middle">Task state machine</text>
  <rect class="guard" x="664" y="70" width="142" height="56" rx="6"/><text class="txt" x="735" y="94" text-anchor="middle">Tool Guard</text><text class="sub" x="735" y="115" text-anchor="middle">Permission / approval</text>
  <rect class="guard" x="664" y="156" width="142" height="56" rx="6"/><text class="txt" x="735" y="180" text-anchor="middle">Output Guard</text><text class="sub" x="735" y="201" text-anchor="middle">DLP / citation</text>
  <rect class="ext" x="846" y="70" width="104" height="56" rx="6"/><text class="txt" x="898" y="104" text-anchor="middle">Tools</text>
  <rect class="ext" x="846" y="156" width="104" height="56" rx="6"/><text class="txt" x="898" y="190" text-anchor="middle">Frontend</text>
  <rect class="comp" x="430" y="262" width="182" height="70" rx="6"/><text class="txt" x="521" y="286" text-anchor="middle">Observability</text><text class="sub" x="521" y="307" text-anchor="middle">trace / false-positive</text><text class="sub" x="521" y="325" text-anchor="middle">review</text>
  <path class="red" d="M184 98H236"/><path class="red" d="M378 98 C414 100 420 136 450 140"/><path class="red" d="M378 184 C414 184 420 158 450 156"/><path class="red" d="M592 136 C626 128 632 98 664 98"/><path class="red" d="M806 98H846"/><path class="red" d="M592 160 C626 166 632 184 664 184"/><path class="red" d="M806 184H846"/><path class="blue" d="M521 184V262"/><path class="blue" d="M735 212 C708 282 638 290 612 290"/>
</svg>
