<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="Prompt injection defense pipeline">
  <defs>
    <marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#d14b4b"/></marker>
    <style>.bg{fill:#fff}.comp{fill:#eef5ff;stroke:#2563eb;stroke-width:1.5}.ext{fill:#f4f4f5;stroke:#9ca3af;stroke-width:1.3}.risk{fill:#fff1f2;stroke:#d14b4b;stroke-width:1.4}.flow{fill:none;stroke:#d14b4b;stroke-width:2;marker-end:url(#r)}.txt{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}</style>
  </defs>
  <rect class="bg" width="980" height="360"/>
  <rect class="ext" x="34" y="78" width="150" height="64" rx="6"/><text class="txt" x="109" y="105" text-anchor="middle">Inputs and</text><text class="txt" x="109" y="123" text-anchor="middle">documents</text><text class="sub" x="109" y="139" text-anchor="middle">User / RAG / tools</text>
  <rect class="comp" x="226" y="78" width="150" height="64" rx="6"/><text class="txt" x="301" y="105" text-anchor="middle">Source labeling</text><text class="sub" x="301" y="125" text-anchor="middle">Instruction / data</text><text class="sub" x="301" y="139" text-anchor="middle">layers</text>
  <rect class="comp" x="418" y="78" width="136" height="64" rx="6"/><text class="txt" x="486" y="105" text-anchor="middle">Injection detection</text><text class="sub" x="486" y="127" text-anchor="middle">Classifier and rules</text>
  <rect class="comp" x="610" y="78" width="150" height="64" rx="6"/><text class="txt" x="685" y="105" text-anchor="middle">Context assembly</text><text class="sub" x="685" y="125" text-anchor="middle">Isolate external</text><text class="sub" x="685" y="139" text-anchor="middle">content</text>
  <rect class="comp" x="792" y="78" width="156" height="64" rx="6"/><text class="txt" x="870" y="105" text-anchor="middle">Model call</text><text class="sub" x="870" y="127" text-anchor="middle">Candidate intent</text>
  <rect class="risk" x="418" y="218" width="150" height="62" rx="6"/><text class="txt" x="493" y="240" text-anchor="middle">Tool policy</text><text class="sub" x="493" y="260" text-anchor="middle">Permission / risk</text><text class="sub" x="493" y="274" text-anchor="middle">/ approval</text>
  <rect class="risk" x="610" y="218" width="150" height="62" rx="6"/><text class="txt" x="685" y="240" text-anchor="middle">Output validation</text><text class="sub" x="685" y="260" text-anchor="middle">DLP / citation</text><text class="sub" x="685" y="274" text-anchor="middle">/ refusal</text>
  <path class="flow" d="M184 110H226"/><path class="flow" d="M376 110H418"/><path class="flow" d="M554 110H610"/><path class="flow" d="M760 110H792"/>
  <path class="flow" d="M870 142 C864 218 618 249 568 249"/><path class="flow" d="M568 249H610"/>
  <text class="sub" x="492" y="314" text-anchor="middle">The model may express intent.</text>
  <text class="sub" x="492" y="334" text-anchor="middle">The platform decides whether to execute or show it.</text>
</svg>
