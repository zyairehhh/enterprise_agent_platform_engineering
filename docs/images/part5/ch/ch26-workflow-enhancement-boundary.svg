<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Workflow 增强边界</title>
  <desc id="desc">展示 Runtime、Planner 和 Workflow 增强机制的边界，说明 Reflexion、Self-Refine 和 ToT 只在 Planner 内部增加受控调用。</desc>
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <text x="640" y="52" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#1f2937">Agentic Workflow 增强边界</text>
  <rect x="90" y="110" width="1100" height="500" rx="14" fill="#ffffff" stroke="#c9ced8" stroke-width="2"/>
  <rect x="130" y="165" width="250" height="360" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="255" y="205" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#3730a3">Runtime</text>
  <text x="255" y="245" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">Run 状态</text>
  <text x="255" y="280" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">取消 / 超时</text>
  <text x="255" y="315" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">检查点</text>
  <text x="255" y="350" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">Tool 执行</text>
  <text x="255" y="385" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">SSE 事件</text>

  <rect x="510" y="165" width="250" height="360" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="635" y="205" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#15803d">Planner</text>
  <text x="635" y="245" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">next_step()</text>
  <text x="635" y="280" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">PlannerDecision</text>
  <text x="635" y="315" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">工具视图</text>
  <text x="635" y="350" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">模式版本</text>

  <rect x="860" y="155" width="280" height="380" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="1000" y="195" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#c2410c">增强机制</text>
  <rect x="900" y="230" width="200" height="52" rx="8" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="1000" y="263" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">Reflexion</text>
  <rect x="900" y="305" width="200" height="52" rx="8" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="1000" y="338" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">Self-Refine</text>
  <rect x="900" y="380" width="200" height="52" rx="8" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="1000" y="413" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#334155">Tree of Thoughts</text>
  <text x="1000" y="475" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#334155">默认关闭</text>
  <text x="1000" y="505" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#334155">计入 Trace 与预算</text>

  <path d="M380 345 L500 345" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M760 345 L850 345" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M850 500 C720 610 500 610 380 500" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="442" y="327" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#475569">调用</text>
  <text x="805" y="327" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#475569">内部增强</text>
  <text x="620" y="642" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#475569">增强机制不改变 Run 六态，只增加受控 LLM 调用和可观测 span</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
