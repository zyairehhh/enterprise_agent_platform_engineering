<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">报告产物与 EvidenceRef 证据链</title>
  <desc id="desc">展示 SQL、Python、图表和报告如何通过 EvidenceRef 形成可追溯证据链。</desc>
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <text x="640" y="54" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#1f2937">报告产物与 EvidenceRef 证据链</text>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="80" y="155" width="190" height="88" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="175" y="191" text-anchor="middle" font-size="21" font-weight="700" fill="#3730a3">SQL Result</text>
    <text x="175" y="220" text-anchor="middle" font-size="16" fill="#334155">metric_id@version</text>

    <rect x="80" y="335" width="190" height="88" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="175" y="371" text-anchor="middle" font-size="21" font-weight="700" fill="#15803d">Python Artifact</text>
    <text x="175" y="400" text-anchor="middle" font-size="16" fill="#334155">贡献度 / 异常</text>

    <rect x="360" y="245" width="210" height="100" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="465" y="284" text-anchor="middle" font-size="21" font-weight="700" fill="#c2410c">EvidenceRef</text>
    <text x="465" y="313" text-anchor="middle" font-size="16" fill="#334155">artifact_id / locator</text>
    <text x="465" y="337" text-anchor="middle" font-size="16" fill="#334155">content_hash</text>

    <rect x="675" y="155" width="195" height="88" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
    <text x="772" y="191" text-anchor="middle" font-size="21" font-weight="700" fill="#be185d">Chart Spec</text>
    <text x="772" y="220" text-anchor="middle" font-size="16" fill="#334155">data_ref / chart_id</text>

    <rect x="675" y="335" width="195" height="88" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="772" y="371" text-anchor="middle" font-size="21" font-weight="700" fill="#a16207">Report Draft</text>
    <text x="772" y="400" text-anchor="middle" font-size="16" fill="#334155">洞察 / 建议 / 附录</text>

    <rect x="985" y="245" width="210" height="100" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="1090" y="284" text-anchor="middle" font-size="21" font-weight="700" fill="#334155">HITL / 发布</text>
    <text x="1090" y="313" text-anchor="middle" font-size="16" fill="#475569">审批快照</text>
    <text x="1090" y="337" text-anchor="middle" font-size="16" fill="#475569">report_id / run_id</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M270 199 C315 205 325 250 360 282"/>
    <path d="M270 379 C315 370 325 330 360 310"/>
    <path d="M570 295 L665 199"/>
    <path d="M570 305 L665 379"/>
    <path d="M870 199 C930 210 945 250 985 282"/>
    <path d="M870 379 C930 370 945 330 985 310"/>
  </g>
  <text x="640" y="610" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#475569">报告可以改措辞，但关键洞察必须保留证据定位、内容 hash 和指标版本</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
