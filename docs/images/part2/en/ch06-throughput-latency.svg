<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Figure 6-2: Throughput and latency trade-off curve</title>
  <desc id="desc">Different inference service shapes occupy different throughput and interactive-latency positions; high throughput usually requires more complex scheduling and tail-latency control.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .plot { fill: #ffffff; stroke: #cbd5e1; rx: 8; filter: url(#shadow); }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .curve { fill: none; stroke: #0891b2; stroke-width: 4; stroke-linecap: round; }
      .bubble1 { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .bubble2 { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .bubble3 { fill: #ffedd5; stroke: #fb923c; stroke-width: 2; }
      .bubble4 { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; }
      .note { fill: #ffffff; stroke: #cbd5e1; rx: 8; filter: url(#shadow); }
      .title { font: 700 32px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .text { font: 400 14px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="58">As throughput rises, tail latency becomes a platform problem</text>
  <text class="subtitle" x="60" y="88">Continuous batching, paged KV, and parallelism raise tokens/s, but interactive workloads still need TTFT and P95/P99 control.</text>

  <rect class="plot" x="92" y="130" width="770" height="500"/>
  <line class="grid" x1="170" y1="200" x2="810" y2="200"/>
  <line class="grid" x1="170" y1="300" x2="810" y2="300"/>
  <line class="grid" x1="170" y1="400" x2="810" y2="400"/>
  <line class="grid" x1="170" y1="500" x2="810" y2="500"/>
  <line class="grid" x1="300" y1="170" x2="300" y2="560"/>
  <line class="grid" x1="430" y1="170" x2="430" y2="560"/>
  <line class="grid" x1="560" y1="170" x2="560" y2="560"/>
  <line class="grid" x1="690" y1="170" x2="690" y2="560"/>
  <line class="axis" x1="170" y1="560" x2="822" y2="560"/>
  <line class="axis" x1="170" y1="560" x2="170" y2="160"/>
  <text class="label" x="820" y="594" text-anchor="end">throughput tokens/s</text>
  <text class="label" x="118" y="210" transform="rotate(-90 118 210)">P95 latency / TTFT</text>

  <path class="curve" d="M210 510 C330 455 442 390 545 315 C650 240 726 222 790 210"/>

  <circle class="bubble3" cx="250" cy="495" r="54"/>
  <text class="label" x="250" y="489" text-anchor="middle">Ollama</text>
  <text class="tiny" x="250" y="510" text-anchor="middle">model trials / edge</text>

  <circle class="bubble1" cx="410" cy="405" r="58"/>
  <text class="label" x="410" y="399" text-anchor="middle">Single node</text>
  <text class="tiny" x="410" y="420" text-anchor="middle">low-concurrency API</text>

  <circle class="bubble2" cx="585" cy="300" r="66"/>
  <text class="label" x="585" y="294" text-anchor="middle">vLLM / TGI</text>
  <text class="tiny" x="585" y="315" text-anchor="middle">continuous batching</text>

  <circle class="bubble4" cx="745" cy="228" r="68"/>
  <text class="label" x="745" y="222" text-anchor="middle">Inference cluster</text>
  <text class="tiny" x="745" y="243" text-anchor="middle">multi-tenant / high QPS</text>

  <rect class="note" x="910" y="164" width="220" height="122"/>
  <text class="label" x="934" y="197">Interactive load</text>
  <text class="text" x="934" y="224">TTFT first</text>
  <text class="text" x="934" y="247">short context / streaming</text>
  <text class="text" x="934" y="270">control P95/P99</text>

  <rect class="note" x="910" y="320" width="220" height="122"/>
  <text class="label" x="934" y="353">Batch and background</text>
  <text class="text" x="934" y="380">throughput first</text>
  <text class="text" x="934" y="403">large batch / queue</text>
  <text class="text" x="934" y="426">higher TTFT acceptable</text>

  <rect class="note" x="910" y="476" width="220" height="122"/>
  <text class="label" x="934" y="509">Platform must add</text>
  <text class="text" x="934" y="536">rate limit / quota / breaker</text>
  <text class="text" x="934" y="559">request length controls</text>
  <text class="text" x="934" y="582">capacity / cost accounting</text>
</svg>
