<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Figure 7-1: Where inference optimization mechanisms apply</title>
  <desc id="desc">Prefix Cache applies to Prefill, KV Cache management applies to cache storage, Speculative Decoding applies to Decode, and quantization applies to weights, activations, and KV Cache.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .stage { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; filter: url(#shadow); }
      .opt-blue { fill: #eff6ff; stroke: #93c5fd; rx: 8; }
      .opt-green { fill: #ecfdf5; stroke: #86efac; rx: 8; }
      .opt-amber { fill: #fffbeb; stroke: #fbbf24; rx: 8; }
      .opt-rose { fill: #fff1f2; stroke: #fda4af; rx: 8; }
      .metric { fill: #f1f5f9; stroke: #cbd5e1; rx: 8; }
      .title { font: 700 32px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 17px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .text { font: 400 14px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="58">Find the bottleneck first: Prefill, KV Cache, or Decode</text>
  <text class="subtitle" x="60" y="88">Optimization mechanisms act at different stages; combine them only with latency, throughput, memory, and quality regression tests.</text>

  <rect class="stage" x="70" y="270" width="160" height="96"/>
  <text class="label" x="150" y="308" text-anchor="middle">Queue</text>
  <text class="text" x="150" y="332" text-anchor="middle">queueing / scheduling</text>

  <rect class="stage" x="280" y="270" width="160" height="96"/>
  <text class="label" x="360" y="308" text-anchor="middle">Prefill</text>
  <text class="text" x="360" y="332" text-anchor="middle">process input context</text>

  <rect class="stage" x="490" y="270" width="160" height="96"/>
  <text class="label" x="570" y="308" text-anchor="middle">KV Cache</text>
  <text class="text" x="570" y="332" text-anchor="middle">store prior K/V</text>

  <rect class="stage" x="700" y="270" width="160" height="96"/>
  <text class="label" x="780" y="308" text-anchor="middle">Decode</text>
  <text class="text" x="780" y="332" text-anchor="middle">generate tokens</text>

  <rect class="stage" x="910" y="270" width="160" height="96"/>
  <text class="label" x="990" y="308" text-anchor="middle">Output</text>
  <text class="text" x="990" y="332" text-anchor="middle">stream response</text>

  <path class="line" d="M230 318 L280 318"/>
  <path class="line" d="M440 318 L490 318"/>
  <path class="line" d="M650 318 L700 318"/>
  <path class="line" d="M860 318 L910 318"/>

  <rect class="opt-green" x="266" y="148" width="188" height="74"/>
  <text class="label" x="360" y="176" text-anchor="middle">Prefix Cache</text>
  <text class="text" x="360" y="199" text-anchor="middle">reuse shared prefixes</text>
  <path class="dash" d="M360 222 L360 270"/>

  <rect class="opt-blue" x="470" y="438" width="200" height="78"/>
  <text class="label" x="570" y="468" text-anchor="middle">Paged KV / eviction</text>
  <text class="text" x="570" y="491" text-anchor="middle">reduce fragmentation</text>
  <path class="dash" d="M570 438 L570 366"/>

  <rect class="opt-rose" x="688" y="148" width="184" height="74"/>
  <text class="label" x="780" y="176" text-anchor="middle">Speculative</text>
  <text class="text" x="780" y="199" text-anchor="middle">draft then verify</text>
  <path class="dash" d="M780 222 L780 270"/>

  <rect class="opt-amber" x="348" y="550" width="416" height="74"/>
  <text class="label" x="556" y="579" text-anchor="middle">Quantization: weights / activations / KV Cache</text>
  <text class="text" x="556" y="602" text-anchor="middle">lower memory and bandwidth; validate quality</text>
  <path class="dash" d="M456 550 C430 500 395 430 372 366"/>
  <path class="dash" d="M622 550 C604 500 588 430 576 366"/>
  <path class="dash" d="M724 550 C748 500 770 430 778 366"/>

  <rect class="metric" x="82" y="438" width="250" height="78"/>
  <text class="label" x="106" y="468">Metrics loop</text>
  <text class="text" x="106" y="491">TTFT / TPOT / tokens/s</text>

  <rect class="metric" x="892" y="438" width="250" height="78"/>
  <text class="label" x="916" y="468">Quality loop</text>
  <text class="text" x="916" y="491">structured output / SQL / safety</text>
</svg>
