<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Figure 6-1: Local inference services in an enterprise platform</title>
  <desc id="desc">Business applications access local inference services through the LLM Gateway and model routing, while the service pool wraps engines, model weights, hardware, metrics, and logs.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; filter: url(#shadow); }
      .layer1 { fill: #eff6ff; stroke: #93c5fd; rx: 8; }
      .layer2 { fill: #f0fdfa; stroke: #5eead4; rx: 8; }
      .layer3 { fill: #fff7ed; stroke: #fdba74; rx: 8; }
      .layer4 { fill: #f5f3ff; stroke: #c4b5fd; rx: 8; }
      .layer5 { fill: #fff1f2; stroke: #fda4af; rx: 8; }
      .title { font: 700 32px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .head { font: 700 20px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .label { font: 700 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .text { font: 400 13px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="58">Local inference engines should be governed by the platform</text>
  <text class="subtitle" x="60" y="88">Inference handles scheduling, cache, parallelism, streaming, and metrics; the gateway handles auth, quotas, routing, audit, and fallback.</text>

  <rect class="panel" x="62" y="132" width="240" height="454"/>
  <text class="head" x="92" y="172">Business side</text>
  <rect class="layer1" x="92" y="208" width="180" height="58"/>
  <text class="label" x="182" y="233" text-anchor="middle">Business app</text>
  <text class="text" x="182" y="254" text-anchor="middle">Agent / RAG / DataAgent</text>
  <rect class="layer1" x="92" y="310" width="180" height="58"/>
  <text class="label" x="182" y="335" text-anchor="middle">Task request</text>
  <text class="text" x="182" y="356" text-anchor="middle">task / tenant / SLO</text>

  <rect class="panel" x="386" y="132" width="256" height="454"/>
  <text class="head" x="416" y="172">Control plane</text>
  <rect class="layer2" x="420" y="208" width="188" height="58"/>
  <text class="label" x="514" y="233" text-anchor="middle">LLM Gateway</text>
  <text class="text" x="514" y="254" text-anchor="middle">auth / rate limit / audit</text>
  <rect class="layer2" x="420" y="310" width="188" height="58"/>
  <text class="label" x="514" y="335" text-anchor="middle">Model routing</text>
  <text class="text" x="514" y="356" text-anchor="middle">task type / tenant / SLA</text>
  <rect class="layer5" x="420" y="412" width="188" height="76"/>
  <text class="label" x="514" y="439" text-anchor="middle">Fallback control</text>
  <text class="text" x="514" y="461" text-anchor="middle">cloud model / fallback</text>
  <text class="text" x="514" y="480" text-anchor="middle">timeout / breaker / rollback</text>

  <rect class="panel" x="724" y="132" width="392" height="454"/>
  <text class="head" x="754" y="172">Local inference service pool</text>
  <rect class="layer3" x="760" y="205" width="320" height="66"/>
  <text class="label" x="920" y="232" text-anchor="middle">Inference engines</text>
  <text class="text" x="920" y="253" text-anchor="middle">vLLM / SGLang / LMDeploy / TGI / Ollama</text>

  <rect class="layer4" x="760" y="302" width="150" height="78"/>
  <text class="label" x="835" y="329" text-anchor="middle">Model weights</text>
  <text class="text" x="835" y="350" text-anchor="middle">BF16 / INT8</text>
  <text class="text" x="835" y="369" text-anchor="middle">INT4 / GGUF</text>

  <rect class="layer4" x="930" y="302" width="150" height="78"/>
  <text class="label" x="1005" y="329" text-anchor="middle">Hardware</text>
  <text class="text" x="1005" y="350" text-anchor="middle">GPU / CPU / NPU</text>
  <text class="text" x="1005" y="369" text-anchor="middle">VRAM / bandwidth</text>

  <rect class="layer3" x="760" y="412" width="320" height="76"/>
  <text class="label" x="920" y="439" text-anchor="middle">Scheduling and optimization</text>
  <text class="text" x="920" y="461" text-anchor="middle">continuous batching / KV cache / parallelism</text>
  <text class="text" x="920" y="480" text-anchor="middle">streaming / constraints / speculative decode</text>

  <rect class="layer5" x="760" y="515" width="320" height="52"/>
  <text class="label" x="920" y="536" text-anchor="middle">Metrics</text>
  <text class="text" x="920" y="555" text-anchor="middle">latency / tokens/s / VRAM / errors</text>

  <path class="line" d="M272 237 C324 237 356 237 420 237"/>
  <path class="line" d="M272 339 C324 339 356 339 420 339"/>
  <path class="line" d="M608 237 C654 237 696 237 760 237"/>
  <path class="line" d="M608 339 C656 339 696 370 760 445"/>
  <path class="dash" d="M920 557 C720 658 410 654 184 368"/>
  <text class="tiny" x="402" y="630">Metrics flow back to the gateway and eval system:</text>
  <text class="tiny" x="402" y="648">capacity planning, canary rollout, incident triage, and cost accounting</text>
</svg>
