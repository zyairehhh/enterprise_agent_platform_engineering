<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">图 8-2：结构化输出的校验与恢复闭环</title>
  <desc id="desc">业务任务经过 Prompt、Schema 和模型调用后，输出必须通过解析、Schema 校验和业务校验，失败时进入修复、重试、降级或人工审核。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; filter: url(#shadow); }
      .prompt { fill: #eff6ff; stroke: #93c5fd; rx: 8; }
      .schema { fill: #f5f3ff; stroke: #c4b5fd; rx: 8; }
      .valid { fill: #ecfdf5; stroke: #86efac; rx: 8; }
      .recover { fill: #fff7ed; stroke: #fdba74; rx: 8; }
      .risk { fill: #fff1f2; stroke: #fda4af; rx: 8; }
      .title { font: 700 32px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .text { font: 400 13px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="58">结构化输出不是“请返回 JSON”，而是一个闭环</text>
  <text class="subtitle" x="60" y="88">Prompt 负责说明任务，Schema 负责定义形状，Validator 负责决定能否进入系统动作。</text>

  <rect class="prompt" x="70" y="202" width="178" height="94"/>
  <text class="label" x="159" y="234" text-anchor="middle">业务任务</text>
  <text class="text" x="159" y="258" text-anchor="middle">intent / context</text>
  <text class="text" x="159" y="278" text-anchor="middle">tenant / risk</text>

  <rect class="prompt" x="300" y="174" width="190" height="76"/>
  <text class="label" x="395" y="204" text-anchor="middle">Prompt Template</text>
  <text class="text" x="395" y="227" text-anchor="middle">变量 / 示例 / 版本</text>

  <rect class="schema" x="300" y="284" width="190" height="76"/>
  <text class="label" x="395" y="314" text-anchor="middle">输出契约</text>
  <text class="text" x="395" y="337" text-anchor="middle">JSON Schema / tools</text>

  <rect class="box" x="548" y="212" width="178" height="96"/>
  <text class="label" x="637" y="246" text-anchor="middle">LLM Gateway</text>
  <text class="text" x="637" y="270" text-anchor="middle">模型路由 / 限流</text>
  <text class="text" x="637" y="290" text-anchor="middle">审计 / 超时</text>

  <rect class="box" x="784" y="212" width="178" height="96"/>
  <text class="label" x="873" y="246" text-anchor="middle">模型输出</text>
  <text class="text" x="873" y="270" text-anchor="middle">JSON / tool_call</text>
  <text class="text" x="873" y="290" text-anchor="middle">可能含格式错误</text>

  <rect class="valid" x="784" y="394" width="178" height="96"/>
  <text class="label" x="873" y="426" text-anchor="middle">解析与校验</text>
  <text class="text" x="873" y="450" text-anchor="middle">parse / schema</text>
  <text class="text" x="873" y="470" text-anchor="middle">business rules</text>

  <rect class="valid" x="1010" y="394" width="136" height="96"/>
  <text class="label" x="1078" y="426" text-anchor="middle">业务消费</text>
  <text class="text" x="1078" y="450" text-anchor="middle">状态机 / UI</text>
  <text class="text" x="1078" y="470" text-anchor="middle">数据库 / 工具</text>

  <rect class="recover" x="548" y="394" width="178" height="96"/>
  <text class="label" x="637" y="426" text-anchor="middle">恢复策略</text>
  <text class="text" x="637" y="450" text-anchor="middle">repair / retry</text>
  <text class="text" x="637" y="470" text-anchor="middle">fallback / human</text>

  <rect class="risk" x="70" y="514" width="420" height="82"/>
  <text class="label" x="100" y="546">关键边界</text>
  <text class="text" x="100" y="570">模型只能生成建议；平台负责鉴权、参数校验、幂等、</text>
  <text class="text" x="100" y="590">审计和人工确认。</text>

  <path class="line" d="M248 249 L300 212"/>
  <path class="line" d="M248 249 L300 322"/>
  <path class="line" d="M490 212 C514 212 524 228 548 244"/>
  <path class="line" d="M490 322 C514 322 524 292 548 276"/>
  <path class="line" d="M726 260 L784 260"/>
  <path class="line" d="M873 308 L873 394"/>
  <path class="line" d="M962 442 L1010 442"/>
  <path class="dash" d="M784 442 L726 442"/>
  <path class="dash" d="M637 394 C638 346 662 320 784 288"/>
  <text class="tiny" x="590" y="532">invalid 输出不会直接进入业务系统；先消耗重试预算，仍失败则转人工或降级。</text>
</svg>
