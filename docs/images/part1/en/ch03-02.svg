<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="900" viewBox="0 0 1680 900" role="img" aria-label="Three-phase migration toward AI-native business systems">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#1f5f8b"/>
    </marker>
    <style>
      .bg{fill:#fff}
      .panel{fill:#f8fbfd;stroke:#b8c8dd;stroke-width:1.6}
      .panel-strong{fill:#f4f8ff;stroke:#2b64b8;stroke-width:2}
      .layer{fill:#fff;stroke:#c8d6e8;stroke-width:1.4}
      .cap{fill:#edf4ff;stroke:#8fb0db;stroke-width:1.2}
      .shared{fill:#f8fbff;stroke:#9fb7d8;stroke-width:1.4}
      .txt{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;fill:#15233b}
      .title{font-size:28px;font-weight:700}
      .sub{font-size:18px;fill:#40506a}
      .small{font-size:15px;fill:#53627a}
      .tiny{font-size:14px;fill:#53627a}
      .label{font-size:18px;font-weight:700}
      .num{font-size:18px;font-weight:700;fill:#fff}
      .badge{fill:#1f5f8b}
      .flow{stroke:#1f5f8b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7c96b8;stroke-width:1.4;fill:none;stroke-dasharray:5 5}
    </style>
  </defs>
  <rect class="bg" width="1680" height="900"/>

  <g transform="translate(110 34)">
    <circle class="badge" cx="30" cy="30" r="22"/><text class="num txt" x="30" y="37" text-anchor="middle">1</text>
    <text class="title txt" x="78" y="25">Phase 1: AI Augmentation</text>
    <text class="sub txt" x="78" y="58">AI capabilities are embedded inside existing systems</text>
  </g>
  <g transform="translate(625 34)">
    <circle class="badge" cx="30" cy="30" r="22"/><text class="num txt" x="30" y="37" text-anchor="middle">2</text>
    <text class="title txt" x="78" y="25">Phase 2: Agent Embedding</text>
    <text class="sub txt" x="78" y="58">Agents coordinate short cross-system task chains</text>
  </g>
  <g transform="translate(1120 34)">
    <circle class="badge" cx="30" cy="30" r="22"/><text class="num txt" x="30" y="37" text-anchor="middle">3</text>
    <text class="title txt" x="78" y="25">Phase 3: AI-Native Task System</text>
    <text class="sub txt" x="78" y="58">Tasks become the organizing center for work</text>
  </g>

  <g transform="translate(72 130)">
    <text class="label txt" x="88" y="56" text-anchor="end">User Entry</text>
    <text class="label txt" x="88" y="206" text-anchor="end">Application</text>
    <text class="label txt" x="88" y="388" text-anchor="end">Platform</text>
    <text class="label txt" x="88" y="525" text-anchor="end">Systems</text>
    <text class="label txt" x="88" y="650" text-anchor="end">Data</text>
  </g>

  <g transform="translate(170 118)">
    <rect class="panel" width="415" height="598" rx="8"/>
    <rect class="layer" x="26" y="22" width="363" height="66" rx="6"/>
    <text class="small txt" x="208" y="59" text-anchor="middle">Web / mobile / desktop entry points</text>
    <rect class="layer" x="26" y="110" width="363" height="198" rx="6"/>
    <g transform="translate(46 136)">
      <rect class="cap" width="66" height="116" rx="6"/><text class="small txt" x="33" y="35" text-anchor="middle">ERP</text><text class="small txt" x="33" y="74" text-anchor="middle">AI</text>
      <rect class="cap" x="80" width="66" height="116" rx="6"/><text class="small txt" x="113" y="35" text-anchor="middle">CRM</text><text class="small txt" x="113" y="74" text-anchor="middle">AI</text>
      <rect class="cap" x="160" width="66" height="116" rx="6"/><text class="small txt" x="193" y="35" text-anchor="middle">BI</text><text class="small txt" x="193" y="74" text-anchor="middle">AI</text>
      <rect class="cap" x="240" width="66" height="116" rx="6"/><text class="small txt" x="273" y="35" text-anchor="middle">Ticket</text><text class="small txt" x="273" y="74" text-anchor="middle">AI</text>
    </g>
    <rect class="layer" x="26" y="338" width="363" height="72" rx="6"/>
    <text class="small txt" x="208" y="380" text-anchor="middle">Model calls, retrieval, logs, permissions</text>
    <rect class="layer" x="26" y="446" width="66" height="54" rx="6"/>
    <rect class="layer" x="116" y="446" width="66" height="54" rx="6"/>
    <rect class="layer" x="206" y="446" width="66" height="54" rx="6"/>
    <rect class="layer" x="296" y="446" width="66" height="54" rx="6"/>
    <rect class="layer" x="26" y="546" width="66" height="54" rx="6"/>
    <rect class="layer" x="116" y="546" width="66" height="54" rx="6"/>
    <rect class="layer" x="206" y="546" width="66" height="54" rx="6"/>
    <rect class="layer" x="296" y="546" width="66" height="54" rx="6"/>
    <rect class="shared" x="26" y="630" width="363" height="58" rx="6"/>
    <text class="tiny txt" x="208" y="653" text-anchor="middle">Feature: capability silos,</text>
    <text class="tiny txt" x="208" y="672" text-anchor="middle">fragmented data and experience</text>
  </g>

  <g transform="translate(635 118)">
    <rect class="panel-strong" width="415" height="598" rx="8"/>
    <rect class="layer" x="26" y="22" width="363" height="66" rx="6"/>
    <text class="small txt" x="208" y="59" text-anchor="middle">Business process / scenario task</text>
    <rect class="layer" x="26" y="110" width="363" height="116" rx="6"/>
    <text class="label txt" x="208" y="145" text-anchor="middle">Agent Layer</text>
    <text class="small txt" x="208" y="176" text-anchor="middle">Editing and execution over legacy systems</text>
    <rect class="layer" x="26" y="250" width="363" height="88" rx="6"/>
    <text class="small txt" x="208" y="286" text-anchor="middle">Runtime, workflow, tools, data services</text>
    <text class="small txt" x="208" y="312" text-anchor="middle">integration, permissions, security</text>
    <rect class="layer" x="26" y="364" width="72" height="54" rx="6"/>
    <rect class="layer" x="112" y="364" width="72" height="54" rx="6"/>
    <rect class="layer" x="198" y="364" width="72" height="54" rx="6"/>
    <rect class="layer" x="284" y="364" width="72" height="54" rx="6"/>
    <rect class="layer" x="26" y="458" width="363" height="58" rx="6"/>
    <text class="small txt" x="208" y="493" text-anchor="middle">Unified data access and semantic layer</text>
    <rect class="shared" x="26" y="630" width="363" height="58" rx="6"/>
    <text class="tiny txt" x="208" y="653" text-anchor="middle">Feature: connected processes,</text>
    <text class="tiny txt" x="208" y="672" text-anchor="middle">shared data and reusable capabilities</text>
  </g>

  <g transform="translate(1100 118)">
    <rect class="panel-strong" width="415" height="598" rx="8"/>
    <rect class="layer" x="26" y="22" width="363" height="72" rx="6"/>
    <text class="label txt" x="208" y="54" text-anchor="middle">Business Goals / Task Center</text>
    <text class="small txt" x="208" y="78" text-anchor="middle">analysis, service, execution, exploration</text>
    <rect class="layer" x="26" y="118" width="363" height="116" rx="6"/>
    <text class="label txt" x="208" y="153" text-anchor="middle">Agent Network</text>
    <text class="small txt" x="208" y="184" text-anchor="middle">autonomous planning, collaboration, review</text>
    <rect class="layer" x="26" y="258" width="363" height="88" rx="6"/>
    <text class="small txt" x="208" y="286" text-anchor="middle">Knowledge, tools, model capabilities,</text>
    <text class="small txt" x="208" y="312" text-anchor="middle">data intelligence, governance, trust</text>
    <rect class="layer" x="26" y="372" width="363" height="54" rx="6"/>
    <text class="small txt" x="208" y="406" text-anchor="middle">System adaptation: API, events, messages</text>
    <rect class="layer" x="26" y="452" width="72" height="54" rx="6"/>
    <rect class="layer" x="112" y="452" width="72" height="54" rx="6"/>
    <rect class="layer" x="198" y="452" width="72" height="54" rx="6"/>
    <rect class="layer" x="284" y="452" width="72" height="54" rx="6"/>
    <rect class="layer" x="26" y="536" width="363" height="56" rx="6"/>
    <text class="small txt" x="208" y="561" text-anchor="middle">Master, business, knowledge,</text>
    <text class="small txt" x="208" y="584" text-anchor="middle">document, external data</text>
    <rect class="shared" x="26" y="630" width="363" height="58" rx="6"/>
    <text class="tiny txt" x="208" y="653" text-anchor="middle">Feature: task-driven work,</text>
    <text class="tiny txt" x="208" y="672" text-anchor="middle">collaboration and continuous optimization</text>
  </g>

  <g transform="translate(80 810)">
    <rect class="shared" width="1520" height="64" rx="8"/>
    <text class="label txt" x="32" y="47">Shared capabilities</text>
    <text class="small txt" x="238" y="47">identity and access</text>
    <text class="small txt" x="430" y="47">policy engine</text>
    <text class="small txt" x="590" y="47">audit and observability</text>
    <text class="small txt" x="820" y="47">evaluation and quality</text>
    <text class="small txt" x="1050" y="47">security and compliance</text>
    <text class="small txt" x="1285" y="47">cost governance</text>
  </g>

  <path class="dash" d="M378 716 V748"/>
  <path class="dash" d="M842 716 V748"/>
  <path class="dash" d="M1308 716 V748"/>
</svg>
