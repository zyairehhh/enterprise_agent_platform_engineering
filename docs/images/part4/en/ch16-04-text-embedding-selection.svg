<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560" role="img">
  <defs>
    <marker id="blue-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#1f5f8b"/>
    </marker>
    <marker id="red-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#b33939"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .external { fill: #f3f4f5; stroke: #8f989f; stroke-width: 1.4; }
      .component { fill: #f8fbfd; stroke: #1f5f8b; stroke-width: 1.7; }
      .control { fill: #fff8f8; stroke: #b33939; stroke-width: 1.5; }
      .flow { stroke: #1f5f8b; stroke-width: 2.1; fill: none; marker-end: url(#blue-arrow); }
      .control-flow { stroke: #b33939; stroke-width: 1.9; fill: none; marker-end: url(#red-arrow); stroke-dasharray: 7 5; }
      .label { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #202a33; }
      .sub { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #52606d; }
      .tag { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; font-weight: 700; fill: #1f5f8b; }
      .tag-red { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; font-weight: 700; fill: #b33939; }
    </style>
  </defs>
  <rect class="bg" width="1320" height="560"/>

  <g transform="translate(70 74)">
    <rect class="external" width="230" height="120" rx="3"/>
    <text class="tag" x="18" y="27">01</text>
    <text class="label" x="18" y="58">Collect corpus</text>
    <text class="sub" x="18" y="84">Policies / contracts / tickets</text>
    <text class="sub" x="18" y="106">Field notes / FAQ</text>
  </g>
  <path class="flow" d="M318 134 H350"/>

  <g transform="translate(368 74)">
    <rect class="component" width="190" height="120" rx="3"/>
    <text class="tag" x="18" y="27">02</text>
    <text class="label" x="18" y="58">Build query set</text>
    <text class="sub" x="18" y="84">Real queries / rewrites</text>
    <text class="sub" x="18" y="106">Hard cases / negatives</text>
  </g>
  <path class="flow" d="M576 134 H648"/>

  <g transform="translate(666 74)">
    <rect class="component" width="230" height="120" rx="3"/>
    <text class="tag" x="18" y="27">03</text>
    <text class="label" x="18" y="58">Select candidates</text>
    <text class="sub" x="18" y="84">API / open-source / local</text>
    <text class="sub" x="18" y="106">Domain models</text>
  </g>
  <path class="flow" d="M896 134 C940 134 940 276 856 276"/>

  <g transform="translate(666 216)">
    <rect class="component" width="190" height="120" rx="3"/>
    <text class="tag" x="18" y="27">04</text>
    <text class="label" x="18" y="58">Offline evaluation</text>
    <text class="sub" x="18" y="84">recall / MRR / nDCG</text>
    <text class="sub" x="18" y="106">latency / cost</text>
  </g>
  <path class="flow" d="M666 276 H576"/>

  <g transform="translate(368 216)">
    <rect class="control" width="190" height="120" rx="3"/>
    <text class="tag-red" x="18" y="27">05</text>
    <text class="label" x="18" y="58">Error analysis</text>
    <text class="sub" x="18" y="84">Terms / long text / tables</text>
    <text class="sub" x="18" y="106">Permissions / multilingual</text>
  </g>
  <path class="flow" d="M368 276 H278"/>

  <g transform="translate(70 216)">
    <rect class="component" width="230" height="120" rx="3"/>
    <text class="tag" x="18" y="27">06</text>
    <text class="label" x="18" y="58">Production picks</text>
    <text class="sub" x="18" y="84">Default model</text>
    <text class="sub" x="18" y="106">Sensitive / rollback model</text>
  </g>

  <path class="control-flow" d="M463 216 C462 172 574 150 666 146"/>

  <g transform="translate(945 94)">
    <rect class="control" width="320" height="238" rx="3"/>
    <text class="tag-red" x="18" y="27">GATE</text>
    <text class="label" x="18" y="58">Enterprise release gate</text>
    <text class="sub" x="18" y="90">1. Business queries cover core use cases</text>
    <text class="sub" x="18" y="118">2. Sensitive-data path is defined</text>
    <text class="sub" x="18" y="146">3. Model version can roll back</text>
    <text class="sub" x="18" y="174">4. Cost and latency meet SLO</text>
    <text class="sub" x="18" y="202">5. Failure cases are reviewable</text>
  </g>

  <g transform="translate(238 416)">
    <rect class="external" width="846" height="72" rx="3"/>
    <text class="sub" x="18" y="24">External baselines may include OpenAI Embedding, BGE-M3,</text>
    <text class="sub" x="18" y="44">Qwen Embedding, E5, GTE, and Jina.</text>
    <text class="sub" x="18" y="62">Business evaluation sets decide the final choice.</text>
  </g>
</svg>
