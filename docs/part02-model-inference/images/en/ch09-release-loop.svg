<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Figure 9-2: Continuous loop for model capability customization</title>
  <desc id="desc">Production logs and feedback pass through data governance into training, RAG updates, and evaluation, then return to production through model registration, canary release, and monitoring.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; filter: url(#shadow); }
      .data { fill: #eff6ff; stroke: #93c5fd; rx: 8; }
      .train { fill: #fff7ed; stroke: #fdba74; rx: 8; }
      .eval { fill: #ecfdf5; stroke: #86efac; rx: 8; }
      .release { fill: #f5f3ff; stroke: #c4b5fd; rx: 8; }
      .risk { fill: #fff1f2; stroke: #fda4af; rx: 8; }
      .title { font: 700 32px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 16px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .text { font: 400 13px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Inter", "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="58">Customization is a release loop, not a training script</text>
  <text class="subtitle" x="60" y="88">Model, adapter, prompt, RAG snapshot, and eval report all enter registries so production issues can be reproduced and rolled back.</text>

  <rect class="box" x="80" y="246" width="158" height="92"/>
  <text class="label" x="159" y="278" text-anchor="middle">Online feedback</text>
  <text class="text" x="159" y="302" text-anchor="middle">trace / corrections</text>
  <text class="text" x="159" y="322" text-anchor="middle">human labels</text>

  <rect class="data" x="298" y="160" width="176" height="92"/>
  <text class="label" x="386" y="192" text-anchor="middle">Data governance</text>
  <text class="text" x="386" y="216" text-anchor="middle">cleaning / masking</text>
  <text class="text" x="386" y="236" text-anchor="middle">dedup / stratify</text>

  <rect class="train" x="536" y="150" width="178" height="102"/>
  <text class="label" x="625" y="182" text-anchor="middle">Training and alignment</text>
  <text class="text" x="625" y="206" text-anchor="middle">SFT / LoRA</text>
  <text class="text" x="625" y="226" text-anchor="middle">DPO / KTO</text>

  <rect class="train" x="536" y="374" width="178" height="102"/>
  <text class="label" x="625" y="406" text-anchor="middle">RAG update</text>
  <text class="text" x="625" y="430" text-anchor="middle">documents / chunks</text>
  <text class="text" x="625" y="450" text-anchor="middle">index / snapshot</text>

  <rect class="eval" x="774" y="246" width="178" height="92"/>
  <text class="label" x="863" y="278" text-anchor="middle">Eval gate</text>
  <text class="text" x="863" y="302" text-anchor="middle">task / safety</text>
  <text class="text" x="863" y="322" text-anchor="middle">regression / cost</text>

  <rect class="release" x="1010" y="160" width="150" height="92"/>
  <text class="label" x="1085" y="192" text-anchor="middle">Registry</text>
  <text class="text" x="1085" y="216" text-anchor="middle">versions / adapter</text>
  <text class="text" x="1085" y="236" text-anchor="middle">eval report</text>

  <rect class="release" x="1010" y="374" width="150" height="92"/>
  <text class="label" x="1085" y="406" text-anchor="middle">Canary release</text>
  <text class="text" x="1085" y="430" text-anchor="middle">routing / rollback</text>
  <text class="text" x="1085" y="450" text-anchor="middle">monitoring / alerts</text>

  <rect class="risk" x="298" y="536" width="654" height="74"/>
  <text class="label" x="326" y="566">Critical isolation</text>
  <text class="text" x="326" y="590">Training data and eval data must stay isolated; RAG knowledge,</text>
  <text class="text" x="326" y="608">adapters, and prompts must be versioned, audited, and rollbackable.</text>

  <path class="line" d="M238 292 C264 262 282 228 298 206"/>
  <path class="line" d="M474 206 L536 201"/>
  <path class="line" d="M474 228 C502 286 536 350 562 374"/>
  <path class="line" d="M714 201 C752 208 782 228 814 246"/>
  <path class="line" d="M714 425 C752 410 790 366 824 338"/>
  <path class="line" d="M952 292 C986 252 1004 226 1010 206"/>
  <path class="line" d="M1085 252 L1085 374"/>
  <path class="dash" d="M1010 420 C760 644 356 604 159 338"/>
  <text class="tiny" x="146" y="654">Production monitoring brings new failures back into the sample pool for continuous improvement.</text>
</svg>
