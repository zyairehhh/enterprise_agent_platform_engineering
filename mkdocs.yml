site_name: 企业级 Agent 平台工程
site_description: 数据智能与 Agent 平台的中文权威开源参考书
site_author: 开源社区
site_url: https://datagallery-lab.github.io/enterprise_agent_platform_engineering/
repo_name: GitHub
repo_url: https://github.com/datagallery-lab/enterprise_agent_platform_engineering
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-sunny
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: 切换浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox

extra_css:
  - stylesheets/extra.css

extra:
  alternate:
    - name: 简体中文
      link: /enterprise_agent_platform_engineering/
      lang: zh
    - name: English
      link: /enterprise_agent_platform_engineering/en/
      lang: en

