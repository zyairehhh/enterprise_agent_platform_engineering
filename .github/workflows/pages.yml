name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages-setup:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Ensure GitHub Pages uses Actions
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_PRIVATE: ${{ github.event.repository.private }}
        run: |
          status="$(
            curl -sS -L \
              -o /tmp/pages.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          )"

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          create_status="$(
            curl -sS -L \
              -o /tmp/pages-create.json \
              -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          )"

          if [ "$create_status" = "201" ] || [ "$create_status" = "204" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          update_status="$(
            curl -sS -L \
              -o /tmp/pages-update.json \
              -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d '{"build_type":"workflow"}'
          )"

          if [ "$update_status" = "200" ] || [ "$update_status" = "204" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          if [ "$REPO_PRIVATE" = "true" ]; then
            echo "::notice::GitHub Pages is unavailable for this private repository on the current plan; skipping deployment."
            cat /tmp/pages-create.json
            exit 0
          fi

          echo "::error::Unable to enable GitHub Pages for ${GITHUB_REPOSITORY}."
          echo "GET response:"
          cat /tmp/pages.json
          echo "POST response:"
          cat /tmp/pages-create.json
          echo "PUT response:"
          cat /tmp/pages-update.json
          exit 1

  build:
    runs-on: ubuntu-latest
    needs: pages-setup
    if: needs.pages-setup.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build Chinese site
        run: mkdocs build --strict --clean --site-dir site

      - name: Build English site
        run: mkdocs build --strict --clean --config-file mkdocs.en.yml --site-dir site/en

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: [pages-setup, build]
    if: needs.pages-setup.outputs.enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
