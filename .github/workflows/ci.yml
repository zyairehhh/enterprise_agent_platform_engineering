name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest mkdocs-material pymdown-extensions
          pip install -e mini-platform

      - name: Chapter template check
        run: python scripts/check_chapter_template.py

      - name: Glossary acronym check
        run: python scripts/check_glossary.py

      - name: Sensitive info scan
        run: python scripts/check_sensitive.py

      - name: mini-platform tests
        working-directory: mini-platform
        run: pytest tests/ -q

      - name: mkdocs build (strict)
        run: mkdocs build --strict

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            docs/**/*.md
            README.md
            PLAN.md
        continue-on-error: true   # v0.1 软门禁，避免空壳大量警告阻断；后续转为强门禁

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 8 docs README.md PLAN.md
        continue-on-error: true   # v0.1 软门禁
