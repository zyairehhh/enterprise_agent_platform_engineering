{# Project override: avoid local Material package file read stalls #}
{% if config.extra.alternate %}
<div class="md-header__option">
  <div class="md-select">
    <button class="md-header__button md-icon" aria-label="{{ lang.t('select.language') }}">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12.9 15.6a15.8 15.8 0 0 0 2.3-5.1h2.3V8.7h-6V6.9H9.7v1.8H3.8v1.8h9.5a13 13 0 0 1-1.6 3.7 12.5 12.5 0 0 1-1.9-2.8H7.9a15.5 15.5 0 0 0 2.6 4.3l-3.1 3.1 1.3 1.3 3-3a13.6 13.6 0 0 0 2.3 1.6l.9-1.6a11.6 11.6 0 0 1-2-1.5ZM20.4 20.5h-1.9l-.7-2h-3.4l-.7 2h-1.9l3.2-8.2h2.2l3.2 8.2Zm-5.5-3.6h2.3L16 13.6l-1.1 3.3Z"/>
      </svg>
    </button>
    <div class="md-select__inner">
      <ul class="md-select__list">
      {% for alt in config.extra.alternate %}
        <li class="md-select__item">
          <a href="{{ alt.link | url }}" hreflang="{{ alt.lang }}" data-md-lang="{{ alt.lang }}" class="md-select__link">{{ alt.name }}</a>
        </li>
      {% endfor %}
      </ul>
    </div>
  </div>
</div>
<script>
  (function () {
    function splitPath(pathname) {
      return pathname.split("/").filter(Boolean);
    }

    function joinPath(parts) {
      return "/" + parts.filter(Boolean).join("/") + "/";
    }

    function findContentStart(parts) {
      for (var i = 0; i < parts.length; i += 1) {
        if (/^part\d+/i.test(parts[i])) return i;
        if (ROOT_TO_EN[parts[i]]) return i;
        if (parts[i] === "front-matter") return i;
      }
      return parts.length;
    }

    function replaceSegment(parts, from, to) {
      var next = parts.slice();
      for (var i = 0; i < next.length; i += 1) {
        if (next[i] === from) {
          next[i] = to;
          break;
        }
      }
      return next;
    }

    var ROOT_TO_EN = {
      abbreviations: ["front-matter", "en", "abbreviations"],
      preface: ["front-matter", "en", "preface"],
      acknowledgements: ["front-matter", "en", "acknowledgements"],
      front_matter_guide: ["front-matter", "en", "front-matter-guide"],
      contributors: ["front-matter", "en", "contributors"]
    };
    var EN_TO_ROOT = {
      abbreviations: ["abbreviations"],
      preface: ["preface"],
      acknowledgements: ["acknowledgements"],
      "front-matter-guide": ["front_matter_guide"],
      contributors: ["contributors"]
    };

    function localizedPath(lang) {
      var parts = splitPath(window.location.pathname);
      var enAt = parts.indexOf("en");
      var contentStart = enAt >= 0 ? enAt + 1 : findContentStart(parts);
      var prefix = enAt >= 0 ? parts.slice(0, enAt) : parts.slice(0, contentStart);
      var content = parts.slice(contentStart);

      if (lang === "en") {
        if (enAt >= 0) return window.location.pathname;
        if (content.length === 0) return joinPath(prefix.concat(["en"]));
        if (/^part\d+/i.test(content[0])) {
          return joinPath(prefix.concat(["en"]).concat(replaceSegment(content, "ch", "en")));
        }
        if (ROOT_TO_EN[content[0]]) {
          return joinPath(prefix.concat(["en"]).concat(ROOT_TO_EN[content[0]]));
        }
        return joinPath(prefix.concat(["en"]));
      }

      if (lang === "zh") {
        if (enAt < 0) return window.location.pathname;
        if (content.length === 0) return joinPath(prefix);
        if (/^part\d+/i.test(content[0])) {
          return joinPath(prefix.concat(replaceSegment(content, "en", "ch")));
        }
        if (content[0] === "front-matter" && content[1] === "en" && EN_TO_ROOT[content[2]]) {
          return joinPath(prefix.concat(EN_TO_ROOT[content[2]]));
        }
        return joinPath(prefix);
      }

      return window.location.pathname;
    }

    {% if config.theme.language == "en" %}
    var currentParts = splitPath(window.location.pathname);
    var currentEnAt = currentParts.indexOf("en");
    if (currentEnAt >= 0 && currentEnAt === currentParts.length - 1) {
      window.location.replace(joinPath(currentParts.concat(["front-matter", "en"])));
      return;
    }
    {% endif %}

    document.querySelectorAll("[data-md-lang]").forEach(function (link) {
      link.setAttribute("href", localizedPath(link.getAttribute("data-md-lang")));
    });
  })();
</script>
{% endif %}
